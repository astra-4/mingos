  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 72px 24px 40px;
      background: #dcebff;
      color: #21345f;
      font-family: 'Nunito Sans', sans-serif;
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
    }

    .blob.one {
      top: -140px;
      left: -120px;
      width: 520px;
      height: 520px;
      background: #bcd8ff;
      opacity: 0.7;
    }

    .blob.two {
      bottom: -180px;
      right: -120px;
      width: 560px;
      height: 560px;
      background: #d8d3ff;
      opacity: 0.6;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      z-index: 6;
      font-family: 'Quicksand', sans-serif;
    }

    .topbar-left {
      display: flex;
      align-items: center;
    }

    .dots {
      display: flex;
      gap: 6px;
    }

    .dots span {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }

    .dots .a {
      background: #1f6bff;
      box-shadow: 0 0 8px rgba(31, 107, 255, 0.5);
    }

    .dots .b {
      background: #9fc0ff;
    }

    .dots .c {
      background: #c9c0ff;
    }

    .os-name {
      font-weight: 700;
      font-size: 15px;
      color: #2b3f6b;
      margin-left: 10px;
      cursor: pointer;
      user-select: none;
    }

    .clock {
      font-weight: 600;
      font-size: 14px;
      color: #3a5286;
    }

    .desktop-apps {
      position: absolute;
      top: 64px;
      left: 18px;
      z-index: 2;
    }

    .app-icon {
      position: absolute;
      z-index: 2;
      width: fit-content;
      padding: 12px;
      border-radius: 18px;
      text-align: center;
      cursor: grab;
      user-select: none;
      transition: background 0.18s ease, box-shadow 0.18s ease;
    }

    .app-icon:active {
      cursor: grabbing;
    }

    .app-icon:hover {
      background: rgba(255, 255, 255, 0.45);
    }

    .app-icon.selected {
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 0 0 2px #1f6bff, 0 0 18px rgba(31, 107, 255, 0.45);
    }

    .icon-art {
      width: 64px;
      height: 64px;
      margin: 0 auto 8px;
      border-radius: 18px;
      background: linear-gradient(145deg, #1f6bff, #b9d4ff);
      box-shadow: 0 8px 18px -6px rgba(31, 107, 255, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: #fff;
    }

    .icon-label {
      margin: 0;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: #2b3f6b;
      text-shadow: 0 1px 6px rgba(255, 255, 255, 0.8);
    }

    .flower {
      position: fixed;
      width: 78px;
      height: 78px;
      z-index: 1;
    }

    .floret {
      position: absolute;
      width: 28px;
      height: 28px;
    }

    .floret .petal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 13px;
      height: 13px;
      margin: -6.5px 0 0 -6.5px;
      border-radius: 3px;
      background: #c4baff;
    }

    .floret .up {
      transform: translate(0, -7px) rotate(45deg);
    }

    .floret .right {
      transform: translate(7px, 0) rotate(45deg);
    }

    .floret .down {
      transform: translate(0, 7px) rotate(45deg);
    }

    .floret .left {
      transform: translate(-7px, 0) rotate(45deg);
    }

    .floret .core {
      left: 50%;
      top: 50%;
      margin: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1f6bff;
      transform: translate(-50%, -50%);

    }

    .windowheader {

    .note-panel h2 {

    .note-panel p {

      color: #4a5d88;

    .note-panel blockquote {

      border-left: 3px solid #c4baff;
      background: rgba(196, 186, 255, 0.18);

      align-items: center;

      font-family: monospace;
      font-size: 12px;
      color: #7d93c4;
    }
  </style>
</head>

  <script>
    var days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                  "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    function updateClock() {
      var now = new Date();

      var hours = now.getHours();
      var minutes = now.getMinutes();
      var ampm = "AM";

      if (hours >= 12) {
        ampm = "PM";
      }
      if (hours > 12) {
        hours = hours - 12;
      }
      if (hours === 0) {
        hours = 12;
      }
      if (minutes < 10) {
        minutes = "0" + minutes;
      }

      var dayName = days[now.getDay()];
      var monthName = months[now.getMonth()];
      var date = now.getDate();

      var timeString = hours + ":" + minutes + " " + ampm;
      var dateString = dayName + ", " + monthName + " " + date;

      document.querySelector("#clock").innerHTML =
        timeString + " &nbsp;•&nbsp; " + dateString;
    }

    updateClock();
    setInterval(updateClock, 1000);

    dragElement(document.getElementById("welcome"));
    dragElement(document.getElementById("starlog"));
    dragElement(document.getElementById("doodle"));
    dragElement(document.getElementById("mix"));
    dragElement(document.getElementById("starlogicon"));
    dragElement(document.getElementById("doodleicon"));
    dragElement(document.getElementById("mixicon"));

    function dragElement(element) {
      var initialX = 0;
      var initialY = 0;
      var currentX = 0;
      var currentY = 0;

      var handle = document.getElementById(element.id + "header");

      if (handle) {
        handle.onmousedown = startDragging;
      } else {
        element.onmousedown = startDragging;
      }

      function startDragging(e) {
        e = e || window.event;
        e.preventDefault();
        initialX = e.clientX;
        initialY = e.clientY;
        document.onmouseup = stopDragging;
        document.onmousemove = elementDrag;
      }

      function elementDrag(e) {
        e = e || window.event;
        e.preventDefault();
        currentX = initialX - e.clientX;
        currentY = initialY - e.clientY;
        initialX = e.clientX;
        initialY = e.clientY;
        element.style.top = (element.offsetTop - currentY) + "px";
        element.style.left = (element.offsetLeft - currentX) + "px";
      }

      function stopDragging() {
        document.onmouseup = null;
        document.onmousemove = null;
      }
    }

    function closeWindow(element) {
      element.style.display = "none";
    }

    function openWindow(element) {
      element.style.display = "block";
      biggestIndex++;
      element.style.zIndex = biggestIndex;
      topBar.style.zIndex = biggestIndex + 1;
    }

    function handleWindowTap(element) {
      biggestIndex++;
      element.style.zIndex = biggestIndex;
      topBar.style.zIndex = biggestIndex + 1;
      deselectIcon(selectedIcon);
    }

    function addWindowTapHandling(element) {
      element.addEventListener("mousedown", function () {
        handleWindowTap(element);
      });
    }

    addWindowTapHandling(welcomeScreen);
    addWindowTapHandling(starlogScreen);
    addWindowTapHandling(doodleScreen);
    addWindowTapHandling(mixScreen);

    var selectedIcon = undefined;

    function selectIcon(element) {
      if (selectedIcon) {
        selectedIcon.classList.remove("selected");
      }
      element.classList.add("selected");
      selectedIcon = element;
    }

    function deselectIcon(element) {
      if (element) {
        element.classList.remove("selected");
      }
      selectedIcon = undefined;
    }

    function handleIconTap(element, windowToOpen) {
      if (element.classList.contains("selected")) {
        deselectIcon(element);
        openWindow(windowToOpen);
      } else {
        selectIcon(element);
      }
    }

    starlogIcon.addEventListener("click", function () {
      handleIconTap(starlogIcon, starlogScreen);
    });

    doodleIcon.addEventListener("click", function () {
      handleIconTap(doodleIcon, doodleScreen);
    });

    mixIcon.addEventListener("click", function () {
      handleIconTap(mixIcon, mixScreen);
    });
